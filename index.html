<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InstaHistory — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg">
  <main class="card">
    <h1>InstaHistory</h1>
    <p class="muted">Inicia sesión para continuar</p>

    <form id="loginForm" class="form">
      <label>
        Correo
        <input id="email" type="email" placeholder="correo@uni.edu" required />
      </label>

      <label>
        Contraseña
        <input id="password" type="password" placeholder="••••••••" required />
      </label>

      <p id="error" class="error" aria-live="polite"></p>

      <button class="btn" type="submit">Entrar</button>
    </form>

    <p class="muted small">
      Demo: usa cualquier correo y contraseña (validación básica).
    </p>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
