<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InstaHistory — Visor OBJ</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <strong>InstaHistory</strong>
      <span class="muted">| Visor OBJ</span>
    </div>

    <nav class="actions">
      <button id="goQR" class="btn secondary">Ir a QR</button>
      <button id="logout" class="btn danger">Salir</button>
    </nav>
  </header>

  <main class="stage">
    <section class="hud">
      <h2 class="h2">Modelos OBJ</h2>
      <p class="muted">
        Los modelos se leen automáticamente desde <strong>assets/modelos</strong>.
      </p>

      <div class="stack">
        <span class="label">Modelos disponibles</span>
        <div id="modelsList" class="modelsList">
          <p class="muted">Buscando modelos...</p>
        </div>
      </div>

      <div class="stack">
        <label for="modelOpacity" class="label">Opacidad del modelo</label>
        <input id="modelOpacity" type="range" min="20" max="100" value="100" />
      </div>

      <div class="row wrap">
        <button id="resetView" class="btn secondary">Reiniciar vista</button>
        <button id="clearModel" class="btn secondary">Quitar modelo</button>
      </div>

      <div class="stack">
        <span class="label">Estado</span>
        <p id="statusText" class="muted">Esperando selección...</p>
      </div>
    </section>

    <section class="canvasWrap">
      <canvas id="threeCanvas"></canvas>
      <div class="badge">OBJ Preview</div>
    </section>
  </main>

  <script type="module" src="./js/experience.js"></script>
</body>
</html>
